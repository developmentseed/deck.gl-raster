version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # Keep the vis.gl ecosystem (deck.gl / luma.gl and the coupled
      # math.gl / loaders.gl packages) in its own PR, since those versions
      # must be upgraded in lockstep. Listed first so these packages match
      # here instead of the dev/prod groups below.
      vis-gl:
        patterns:
          - "@deck.gl/*"
          - "@luma.gl/*"
          - "@math.gl/*"
          - "@loaders.gl/*"
        update-types:
          - "patch"
          - "minor"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
      prod-dependencies:
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
