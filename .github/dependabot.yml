version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # Separate group for visgl libraries, released jointly
      vis-gl:
        patterns:
          - "@deck.gl/*"
          - "@luma.gl/*"
          - "@math.gl/*"
          - "@loaders.gl/*"
        update-types:
          - "patch"
          - "minor"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
      prod-dependencies:
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
